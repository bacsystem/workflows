name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test

      # workflows/parallel-plan-executor.js is generated from
      # workflows-src/parallel-plan-executor.template.js — never hand-edited.
      # This catches a PR that changed the template (or an inlined src/ module)
      # without re-running `npm run build`, which npm test alone can't see
      # since it only checks the *committed* generated file, not whether it's
      # still in sync with its source.
      - name: Verify workflows/parallel-plan-executor.js is in sync with its template
        run: |
          npm run build
          git diff --exit-code workflows/parallel-plan-executor.js
